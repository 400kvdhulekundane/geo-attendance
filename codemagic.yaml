workflows:
  android-debug:
    name: Android Debug APK
    max_build_duration: 30
    environment:
      node: 18
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Capacitor add android
        script: npx cap add android || true
      - name: Add Android permissions
        script: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          PERMISSIONS='    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION"/>\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION"/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"/>'
          sed -i '' "s|</manifest>|${PERMISSIONS}\n</manifest>|" "$MANIFEST"
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build debug APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk